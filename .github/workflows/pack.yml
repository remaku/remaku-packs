name: Pack

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIPs
        shell: bash
        run: |
          mkdir -p output
          for game_dir in packs/*/; do
            game=$(basename "$game_dir")
            for pack_dir in "$game_dir"*/; do
              pack=$(basename "$pack_dir")
              (cd "$pack_dir" && zip -qr "../../../output/${game}-${pack}.zip" .)
            done
          done
          echo "--- Built packs ---"
          ls -lh output/

      - name: Extract changelog for this version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          sed -n "/^## v${tag}$/,/^## /{/^## v${tag}$/d;/^## /d;p}" CHANGELOG.md > RELEASE_BODY.md || true

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: output/*.zip
          body_path: RELEASE_BODY.md
